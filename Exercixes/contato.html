<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Contato | StartEdu</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;700&display=swap" rel="stylesheet">

<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="bg-grid"></div>
<div class="blur blur1"></div>
<div class="blur blur2"></div>

<header class="header">

    <div class="logo">
        <span>Start</span>Edu
    </div>

    <nav class="menu">
        <a href="index.html">Início</a>
        <a href="cursos.html">Cursos</a>
        <a href="contato.html" class="active">Contato</a>
    </nav>

</header>

<section class="page-hero">

    <span class="mini-tag">
        ENTRE EM CONTATO
    </span>

    <h1>
        Vamos criar algo
        incrível juntos.
    </h1>

    <p>
        Tire dúvidas, converse com nossa equipe
        ou descubra qual curso combina com você.
    </p>

</section>

<section class="contact-section">

    <form class="contact-form">

        <div class="input-group">
            <label>Nome Completo</label>
            <input type="text" placeholder="Digite seu nome">
        </div>

        <div class="input-group">
            <label>E-mail</label>
            <input type="email" placeholder="Digite seu e-mail">
        </div>

        <div class="input-group">
            <label>Assunto</label>
            <input type="text" placeholder="Assunto da mensagem">
        </div>

        <div class="input-group">
            <label>Mensagem</label>
            <textarea placeholder="Digite sua mensagem"></textarea>
        </div>

        <button type="submit" class="btn-primary">
            Enviar Mensagem
        </button>

    </form>

</section>

<footer class="footer">

    <div class="footer-logo">
        StartEdu
    </div>

    <div class="footer-links">
        <a href="#">Instagram</a>
        <a href="#">LinkedIn</a>
        <a href="#">GitHub</a>
    </div>

    <p>
        © 2025 StartEdu — Todos os direitos reservados.
    </p>

</footer>

</body>
</html>
